<!doctype html>
<!-- @dsCard group="Brand" name="Iconography" subtitle="Inline lucide-style SVG · stroke 1.5–2 · no emoji" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Iconography</title>
<style>
  body { padding: 22px 28px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; align-items: end; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ic .glyph {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-strong);
  }
  .ic .nm { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: center; }
  .note { margin-top: 14px; font-family: var(--font-serif); font-size: 13px; line-height: 1.5; color: var(--fg); }
  .note b { color: var(--fg-strong); font-family: var(--font-sans); font-weight: 600; }
  .note code { font-family: var(--font-mono); font-size: .88em; color: var(--fg-strong); }
</style>
</head>
<body>
  <div class="grid">
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></div>
      <div class="nm">sun</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></div>
      <div class="nm">moon</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></div>
      <div class="nm">monitor</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></div>
      <div class="nm">arrow-right</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 5 12 12 19"></polyline></svg></div>
      <div class="nm">arrow-left</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg></div>
      <div class="nm">external</div>
    </div>
    <div class="ic">
      <div class="glyph"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg></div>
      <div class="nm">chevron-up</div>
    </div>
  </div>
  <div class="note"><b>Inline SVG only.</b> 24×24 viewBox · stroke 1.5–2 · <code>currentColor</code> · round joins · no fills. Same family as lucide. The site ships <em>only</em> the first five glyphs; the rest are reasonable additions from the same family.</div>
</body>
</html>
