<!doctype html>
<!-- @dsCard group="Brand" name="Theme toggle" subtitle="Light · Dark · System — lives in the footer" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<title>Theme toggle</title>
<style>
  .wrap {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .side {
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .side.light { background: #f6f6fa; color: rgba(22,24,48,.62); border-color: rgba(22,24,48,.13); }
  .side.dark  { background: #0f1126; color: rgba(228,230,248,.76); border-color: rgba(228,230,248,.16); }
  .side .row { display: flex; justify-content: space-between; align-items: center; }
  .grp { display: inline-flex; gap: 4px; }
  .iconbtn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 9999px;
    color: currentColor; transition: color .3s, background .3s;
    cursor: pointer; background: transparent; border: none;
  }
  .side.light .iconbtn:hover { background: rgba(22,24,48,.06); }
  .side.dark  .iconbtn:hover { background: rgba(228,230,248,.08); }
  .side.light .iconbtn[aria-pressed="true"] { background: rgba(22,24,48,.08); color: #161830; }
  .side.dark  .iconbtn[aria-pressed="true"] { background: rgba(228,230,248,.12); color: #eff1fb; }
  .copy { font-family: var(--font-sans); font-size: 12px; }
  .side.light .copy { color: rgba(22,24,48,.55); }
  .side.dark  .copy { color: rgba(228,230,248,.55); }
  .meta { font-family: var(--font-mono); font-size: 10px; margin-top: 10px; }
  .side.light .meta { color: rgba(22,24,48,.42); }
  .side.dark  .meta { color: rgba(228,230,248,.48); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="side light">
      <div class="row">
        <div class="copy">© 2024 | Dispatches</div>
        <div class="grp" role="group" aria-label="Theme">
          <button class="iconbtn" aria-pressed="true" aria-label="Light"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
          <button class="iconbtn" aria-pressed="false" aria-label="Dark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
          <button class="iconbtn" aria-pressed="false" aria-label="System"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></button>
        </div>
      </div>
      <div class="meta">light · paper · #f6f6fa</div>
    </div>
    <div class="side dark">
      <div class="row">
        <div class="copy">© 2024 | Dispatches</div>
        <div class="grp" role="group" aria-label="Theme">
          <button class="iconbtn" aria-pressed="false" aria-label="Light"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></button>
          <button class="iconbtn" aria-pressed="true" aria-label="Dark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
          <button class="iconbtn" aria-pressed="false" aria-label="System"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg></button>
        </div>
      </div>
      <div class="meta">dark · night · #0f1126</div>
    </div>
  </div>
</body>
</html>
